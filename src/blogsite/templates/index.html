{% extends "base.html" %}

{% block title %}Home — My Blog{% endblock %}

{% block content %}
<section class="post-list">
  <h1 class="page-heading">Latest Posts</h1>

  {% if posts %}
    {% for post in posts %}
      <article class="post-card">
        <h2 class="post-card__title">
          <a href="{{ url_for('post', slug=post['slug']) }}">{{ post['title'] }}</a>
        </h2>
        <time class="post-card__date" datetime="{{ post['created_at'].isoformat() }}">
          {{ post['created_at'].strftime('%Y-%m-%d') }}
        </time>
      </article>
    {% endfor %}
  {% else %}
    <p class="empty-state">No posts yet. Check back soon!</p>
  {% endif %}
</section>
{% endblock %}
