{% extends "base.html" %}

{% block title %}New Post — Admin{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/editor.css') }}" />
{% endblock %}

{% block content %}
<div class="admin-header">
  <h1 class="page-heading">New Post</h1>
  <a href="{{ url_for('admin_dashboard') }}" class="btn">← Dashboard</a>
</div>

<form method="post" action="{{ url_for('admin_new_post') }}" class="form post-form">
  <div class="form__group">
    <label for="title" class="form__label">Title</label>
    <input id="title" name="title" type="text" class="form__input" required autofocus
           value="{{ request.form.get('title', '') }}" />
  </div>

  <div class="form__group editor-group">
    <div class="editor-pane">
      <label for="content" class="form__label">Content <span class="text-muted">(Markdown)</span></label>
      <textarea id="content" name="content" class="form__textarea editor-textarea" rows="24"
                required placeholder="Write your post in Markdown…">{{ request.form.get('content', '') }}</textarea>
    </div>
    <div class="preview-pane">
      <label class="form__label">Preview</label>
      <div id="preview" class="prose preview-output"></div>
    </div>
  </div>

  <div class="form__group form__group--inline">
    <label class="form__checkbox-label">
      <input type="checkbox" name="published" value="1"
             {% if request.form.get('published') != '0' %}checked{% endif %} />
      Publish immediately
    </label>
  </div>

  <div class="form__actions">
    <button type="submit" class="btn btn--primary">Create Post</button>
    <a href="{{ url_for('admin_dashboard') }}" class="btn">Cancel</a>
  </div>
</form>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/editor.js') }}"></script>
{% endblock %}
